<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button type="button" onclick="toggle('livingRoom')">Living Room</button>
    <br><br>
    <button type="button" onclick="toggle('bathroom')">Bathroom</button>
    <br><br>
    <button type="button" onclick="toggle('closet')">Closet</button>
</body>
<script>


function toggle(room) 
{
  fetch(`http://192.168.1.12/${room}`)
  .then(response => response.json()) 
  .then(data => console.log(data))   
  .catch(error => console.error(error));
}
</script>
</html>
